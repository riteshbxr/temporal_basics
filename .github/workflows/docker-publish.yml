name: Build and Push Multi-Platform Docker Image

on:
  push:
    tags:
      - "v*"          # triggers on version tags like v1.2.0
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enable containerd image store in the Docker daemon.
      # The default overlay snapshotter can only hold single-arch images;
      # containerd snapshotter stores multi-platform manifests natively,
      # which is what makes load: true work with multiple platforms.
      - name: Enable containerd image store
        run: |
          echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # QEMU provides cross-architecture emulation so the amd64 runner can
      # build and execute arm64 binaries during the image build.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Use the docker driver (not the default docker-container driver) so
      # buildx shares the same Docker daemon that has the containerd store.
      # The docker-container driver runs BuildKit in a separate container with
      # its own store, which would bypass the containerd image store entirely.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          # strips leading 'v': v1.2.0 → 1.2.0
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build (load into local containerd store)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          load: true
          tags: |
            riteshbxr/temporal-poc:${{ steps.meta.outputs.version }}
            riteshbxr/temporal-poc:latest

      - name: Push
        run: |
          docker push riteshbxr/temporal-poc:${{ steps.meta.outputs.version }}
          docker push riteshbxr/temporal-poc:latest
