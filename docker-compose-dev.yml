services:
  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=cassandra
      - CASSANDRA_SEEDS=cassandra
      - CASSANDRA_PORT=9042
      - ENABLE_ES=true
      - ES_SEEDS=opensearch
      - ES_PORT=9200
      - ES_VERSION=v7
      - ES_SCHEME=http
    ports:
      - "7233:7233"
    depends_on:
      cassandra:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no Zookeeper required
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      # PLAINTEXT = external (host) access; INTERNAL = inter-container access
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # Single-broker settings — default RF=3 prevents group coordinator from starting
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  local-api:
    build: .
    command: go run api/main.go
    ports:
      - "8081:8081"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - KAFKA_BROKER=kafka:29092
    depends_on:
      temporal:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  local-worker:
    build: .
    command: go run worker/main.go
    environment:
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    restart: on-failure

  local-kafka-consumer:
    build: .
    command: go run kafka-consumer/main.go
    environment:
      - TEMPORAL_HOST=temporal:7233
      - KAFKA_BROKER=kafka:29092
    depends_on:
      temporal:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
